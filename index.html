<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flash Attendance</title>
    <style>
        body { background: #0c0c0c; color: #fff; font-family: sans-serif; text-align: center; margin: 0; padding: 15px; }
        .container { max-width: 400px; margin: auto; background: #1a1a1a; padding: 20px; border-radius: 20px; }
        h1 { color: #ff3333; font-size: 24px; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #444; background: #222; color: #fff; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; margin-top: 10px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
        .save-btn { background: #ff3333; color: white; }
        .total-box { background: #333; color: #ffcc00; padding: 15px; border-radius: 10px; margin: 20px 0; font-size: 18px; font-weight: bold; }
        .table-container { background: #222; padding: 10px; border-radius: 15px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { padding: 8px 2px; border-bottom: 1px solid #444; border-right: 1px solid #444; }
        th:last-child, td:last-child { border-right: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🕐 Attendance</h1>
        <div id="userSetup"><input type="text" id="userName" placeholder="Apna Naam..."><button class="btn save-btn" onclick="setUser()">START APP</button></div>
        <div id="mainApp" style="display:none;">
            <h2 id="welcomeText" style="font-size: 16px;"></h2>
            <input type="time" id="time">
            <button id="actionBtn" class="btn save-btn" onclick="handleOT()">Save OT</button>
            <div class="total-box" id="totalOT">Total OT: 0</div>
            <div class="table-container"><table><thead><tr><th>Date</th><th>Time</th><th>OT</th></tr></thead><tbody id="tableBody"></tbody></table></div>
        </div>
    </div>

    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbybqkBacKM6rcExcHY9PK7I_c4CmTx5NcLfQAi_HLJx0QIv3TTDTyC5RjHRZlX5--6G/exec";
        let myData = [];
        let isEditing = false;

        function setUser() {
            let name = document.getElementById("userName").value;
            if(!name) return alert("Naam likho!");
            localStorage.setItem("my_name", name);
            location.reload();
        }

        async function loadMyData() {
            let name = localStorage.getItem("my_name");
            let res = await fetch(scriptURL + "?name=" + name);
            myData = await res.json();
            let tbody = document.getElementById("tableBody");
            let total = 0;
            let today = new Date().toISOString().split('T')[0];
            
            myData.forEach((row, i) => {
                if(i > 0) {
                    let d = row[0].toString().split('T')[0];
                    tbody.innerHTML += `<tr><td>${d}</td><td>${row[2]}</td><td>${row[3]}</td></tr>`;
                    total += parseFloat(row[3]);
                    if(d == today) {
                        isEditing = true;
                        document.getElementById("actionBtn").innerText = "Update Today's OT";
                        document.getElementById("time").value = row[2];
                    }
                }
            });
            document.getElementById("totalOT").innerText = "Total OT: " + total;
        }

        async function handleOT() {
            let name = localStorage.getItem("my_name");
            let time = document.getElementById("time").value;
            let date = new Date().toISOString().split('T')[0];
            let ot = (parseInt(time.split(":")[0]) >= 18) ? (parseInt(time.split(":")[0]) - 18) : 0;
            
            let action = isEditing ? "UPDATE" : "SAVE";
            await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({action, date, name, time, ot: ot.toFixed(0)}) });
            alert("✅ Done!");
            location.reload();
        }

        let name = localStorage.getItem("my_name");
        if(name) {
            document.getElementById("userSetup").style.display = "none";
            document.getElementById("mainApp").style.display = "block";
            document.getElementById("welcomeText").innerText = "User: " + name;
            loadMyData();
        }
    </script>
</body>
</html>
