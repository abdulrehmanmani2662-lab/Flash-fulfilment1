<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flash Attendance PRO</title>
    <style>
        body { background-color: #0c0c0c; color: white; font-family: sans-serif; text-align: center; padding: 20px; margin: 0; }
        h1 { color: #ff3333; text-shadow: 0px 0px 15px #ff3333; border-bottom: 2px solid #ff3333; padding-bottom: 10px; font-size: 40px; font-weight: 900; }
        .container { max-width: 500px; margin: auto; }
        input { width: 90%; padding: 15px; margin: 10px 0; border-radius: 10px; border: 2px solid #ff4d4d; background: #1a1a1a; color: white; font-size: 20px; box-sizing: border-box; }
        .save-btn { background: linear-gradient(45deg, #ff3b3b, #cc0000); color: #fff200; width: 90%; padding: 15px; font-size: 26px; font-weight: 900; border-radius: 12px; border: 2px solid #ffaaaa; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🕐 Attendance</h1>
        <input type="text" id="name" placeholder="Apna Naam...">
        <input type="date" id="attendanceDate">
        <input type="time" id="time">
        <button class="save-btn" onclick="saveData()">Save Record</button>
    </div>

    <script>
        document.getElementById('attendanceDate').valueAsDate = new Date();
        
        async function saveData() {
            let name = document.getElementById("name").value.trim();
            let date = document.getElementById("attendanceDate").value;
            let time = document.getElementById("time").value;
            
            if(name === "") { alert("⚠️ Naam likhein!"); return; }

            let t = time.split(":");
            let hour = parseInt(t[0]);
            let minute = parseInt(t[1]);
            let ot = hour >= 18 ? (hour - 18) + (minute / 60) : 0;

            const scriptURL = "https://script.google.com/macros/s/AKfycbzlagtlehkdtrk-_LYO6n74JIuZBezXabjka03BdLjqDGy7bwbsbHH2ZVtgN_xGSGGP/exec";

            try {
                await fetch(scriptURL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({date: date, name: name, time: time, ot: ot.toFixed(2)})
                });
                alert("✅ Record Saved!");
                document.getElementById("name").value = "";
            } catch (error) {
                alert("Error: " + error);
            }
        }
    </script>
</body>
</html>
