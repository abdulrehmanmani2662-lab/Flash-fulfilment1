<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flash Attendance</title>
    <style>
        body { background: #0c0c0c; color: #fff; font-family: sans-serif; text-align: center; margin: 0; padding: 15px; }
        .container { max-width: 400px; margin: auto; background: #1a1a1a; padding: 20px; border-radius: 20px; }
        h1 { color: #ff3333; font-size: 24px; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #444; background: #222; color: #fff; box-sizing: border-box; }
        .checkbox-container { display: flex; align-items: center; gap: 10px; color: #ffcc00; margin: 10px 0; font-size: 14px; }
        .btn { width: 100%; padding: 12px; margin-top: 10px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
        .save-btn { background: #ff3333; color: white; }
        .csv-btn { background: #008800; color: white; }
        .total-box { background: #333; color: #ffcc00; padding: 15px; border-radius: 10px; margin: 20px 0; font-size: 18px; font-weight: bold; }
        .table-container { background: #222; padding: 10px; border-radius: 15px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
        th, td { padding: 8px 2px; border-bottom: 1px solid #444; border-right: 1px solid #444; color: #fff; }
        th:last-child, td:last-child { border-right: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🕐 Attendance</h1>
        <div id="userSetup"><input type="text" id="userName" placeholder="Apna Naam..."><button class="btn save-btn" onclick="setUser()">START APP</button></div>
        <div id="mainApp" style="display:none;">
            <h2 id="welcomeText" style="font-size: 16px;"></h2>
            <input type="time" id="time">
            <div class="checkbox-container"><input type="checkbox" id="breakCheck" style="width:20px;">Break hui? (6:00 se OT)</div>
            <button id="actionBtn" class="btn save-btn" onclick="handleOT()">Save OT</button>
            <button class="btn csv-btn" onclick="downloadMyCSV()">📥 Download CSV</button>
            <div class="total-box" id="totalOT">Total OT: 0</div>
            <div class="table-container"><table><thead><tr><th>Date</th><th>Time</th><th>OT</th></tr></thead><tbody id="tableBody"></tbody></table></div>
        </div>
    </div>

    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbxdrsiAuL-nSTG_4-Pac9Aa5DcBZavzpEBwOYxXUzP6WjcpaV2C6hHNJQv9GSwLYcXD/exec";
        let myData = [];
        let isEditing = false;

        function setUser() {
            let name = document.getElementById("userName").value;
            if(!name) return alert("Naam likho!");
            localStorage.setItem("my_name", name);
            location.reload();
        }

        async function loadMyData() {
            let res = await fetch(scriptURL + "?name=" + localStorage.getItem("my_name"));
            myData = await res.json();
            let tbody = document.getElementById("tableBody");
            let total = 0, today = new Date().toISOString().split('T')[0];
            
            myData.forEach((row, i) => {
                if(i > 0) {
                    let d = row[0].toString().split('T')[0];
                    let t = row[2].toString().length > 5 ? row[2].toString().substring(11, 16) : row[2];
                    tbody.innerHTML += `<tr><td>${d}</td><td>${t}</td><td>${row[3]}</td></tr>`;
                    total += parseFloat(row[3]);
                    if(d == today) {
                        isEditing = true;
                        document.getElementById("actionBtn").innerText = "Update Today's OT";
                        document.getElementById("time").value = t;
                    }
                }
            });
            document.getElementById("totalOT").innerText = "Total OT: " + total;
        }

        async function handleOT() {
            let name = localStorage.getItem("my_name"), time = document.getElementById("time").value;
            if(!time) return alert("Time select karo!");
            
            let startHour = document.getElementById("breakCheck").checked ? 6 : 5.5;
            let hour = parseInt(time.split(":")[0]) + (parseInt(time.split(":")[1])/60);
            let ot = hour > startHour ? (hour - startHour).toFixed(1) : 0;
            
            let action = isEditing ? "UPDATE" : "SAVE";
            await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({action, date: new Date().toISOString().split('T')[0], name, time, ot}) });
            alert("✅ Done!");
            location.reload();
        }

        let name = localStorage.getItem("my_name");
        if(name) {
            document.getElementById("userSetup").style.display = "none";
            document.getElementById("mainApp").style.display = "block";
            document.getElementById("welcomeText").innerText = "User: " + name;
            loadMyData();
        }

        function downloadMyCSV() {
            let csv = "Date,Time,OT\n";
            myData.forEach((r, i) => { if(i>0) csv += `${r[0]},${r[2]},${r[3]}\n`; });
            let blob = new Blob([csv], { type: 'text/csv' });
            let url = URL.createObjectURL(blob);
            let a = document.createElement("a");
            a.href = url; a.download = "Attendance.csv"; a.click();
        }
    </script>
</body>
</html>
