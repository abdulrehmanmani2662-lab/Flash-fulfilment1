<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flash Attendance</title>
    <style>
        /* Mobile-First Design */
        body { background: #0c0c0c; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 10px; }
        .container { max-width: 400px; margin: auto; background: #1a1a1a; padding: 20px; border-radius: 20px; box-shadow: 0 0 20px rgba(255,51,51,0.2); }
        h1 { color: #ff3333; font-size: 28px; margin-bottom: 20px; }
        
        select, input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 2px solid #333; background: #222; color: white; font-size: 16px; box-sizing: border-box; }
        .save-btn { background: #ff3333; color: white; width: 100%; padding: 15px; font-weight: bold; font-size: 18px; border-radius: 12px; border: none; cursor: pointer; margin-top: 10px; }
        .view-btn { background: transparent; color: #00ff00; border: 2px solid #00ff00; padding: 12px; width: 100%; margin-top: 15px; border-radius: 12px; }
        
        table { width: 100%; margin-top: 20px; border-collapse: collapse; color: white; font-size: 14px; }
        th, td { padding: 8px; border: 1px solid #444; }
        th { background: #333; color: #ff3333; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🕐 Attendance</h1>
        
        <div id="userSetup">
            <select id="userName">
                <option value="">Apna Naam Select Karein</option>
                <option value="Muzamil">Muzamil</option>
                <option value="Tiger">Tiger</option>
                <option value="Zain">Zain</option>
            </select>
            <button class="save-btn" onclick="setUser()">SET USER</button>
        </div>

        <div id="mainApp" style="display:none;">
            <h2 id="welcomeText" style="font-size: 18px;"></h2>
            <input type="time" id="time">
            <button class="save-btn" onclick="saveOT()">Save Ot</button>
            <button class="view-btn" onclick="loadMyData()">🔍 Apna Record Dekho</button>
            <table id="recordTable">
                <thead><tr><th>Date</th><th>Time</th><th>OT</th></tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbybqkBacKM6rcExcHY9PK7I_c4CmTx5NcLfQAi_HLJx0QIv3TTDTyC5RjHRZlX5--6G/exec";

        let currentUser = localStorage.getItem("my_name");
        if(currentUser) { showApp(currentUser); }

        function setUser() {
            let name = document.getElementById("userName").value;
            if(!name) return alert("Pehle naam select karo!");
            localStorage.setItem("my_name", name);
            showApp(name);
        }

        function showApp(name) {
            document.getElementById("userSetup").style.display = "none";
            document.getElementById("mainApp").style.display = "block";
            document.getElementById("welcomeText").innerText = "Welcome, " + name;
            loadMyData();
        }

        async function saveOT() {
            let name = localStorage.getItem("my_name");
            let time = document.getElementById("time").value;
            let date = new Date().toISOString().split('T')[0];
            let ot = (parseInt(time.split(":")[0]) >= 18) ? (parseInt(time.split(":")[0]) - 18) : 0;

            if(!time) return alert("Time select karo!");
            await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({date, name, time, ot: ot.toFixed(2)}) });
            alert("✅ Saved!");
            location.reload();
        }

        async function loadMyData() {
            let name = localStorage.getItem("my_name");
            let res = await fetch(scriptURL + "?name=" + name);
            let data = await res.json();
            let tbody = document.getElementById("tableBody");
            tbody.innerHTML = "";
            data.forEach((row, i) => {
                if(i > 0) tbody.innerHTML += `<tr><td>${row[0]}</td><td>${row[2]}</td><td>${row[3]}</td></tr>`;
            });
        }
    </script>
</body>
</html>
