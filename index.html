<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flash Attendance PRO</title>
    <style>
        body { background-color: #0c0c0c; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .container { max-width: 500px; margin: auto; }
        input { width: 90%; padding: 15px; margin: 10px 0; border-radius: 10px; border: 2px solid #ff4d4d; background: #1a1a1a; color: white; font-size: 20px; }
        .save-btn { background: linear-gradient(45deg, #ff3333, #880000); color: #fff200; width: 90%; padding: 15px; font-size: 22px; font-weight: 900; border-radius: 12px; cursor: pointer; }
        .csv-btn { background: #1a1a1a; color: #00ff00; width: 90%; padding: 12px; font-size: 20px; border-radius: 10px; border: 2px solid #00ff00; cursor: pointer; margin-top: 20px; }
        table { width: 90%; margin: 30px auto; border-collapse: collapse; background: #1a1a1a; }
        th, td { padding: 12px; border: 1px solid #ff4d4d; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🕐 Attendance</h1>
        <input type="text" id="name" placeholder="Naam...">
        <input type="time" id="time">
        <button class="save-btn" onclick="saveOT()">Save Ot</button>
        
        <table id="recordTable">
            <thead><tr><th>Date</th><th>Name</th><th>Time</th><th>OT</th></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
        
        <button class="csv-btn" onclick="downloadCSV()">📥 Download CSV</button>
    </div>

    <script>
        // Aapka naya URL yahan set kar diya gaya hai
        const scriptURL = "https://script.google.com/macros/s/AKfycbzH8hVFIBYkYCxol6i-iqK6Na9AQGiERqFEeuqurRZwbEkqatKmbIuF-ZF0yEYseBX3/exec";
        let localRecords = [];

        async function saveOT() {
            let name = document.getElementById("name").value.trim();
            let time = document.getElementById("time").value;
            let date = new Date().toISOString().split('T')[0];
            let ot = (parseInt(time.split(":")[0]) >= 18) ? (parseInt(time.split(":")[0]) - 18) : 0;

            if(!name || !time) { alert("⚠️ Naam aur Time likhein!"); return; }

            // 1. Google Sheet mein data bhejo
            await fetch(scriptURL, { 
                method: 'POST', 
                mode: 'no-cors', 
                body: JSON.stringify({date, name, time, ot: ot.toFixed(2)}) 
            });
            
            // 2. Screen par table mein add karo
            localRecords.push({date, name, time, ot: ot.toFixed(2)});
            let tbody = document.getElementById("tableBody");
            tbody.innerHTML += `<tr><td>${date}</td><td>${name}</td><td>${time}</td><td>${ot.toFixed(2)}</td></tr>`;
            
            alert("✅ Saved to Sheet!");
        }

        function downloadCSV() {
            if (localRecords.length === 0) { alert("⚠️ Data khali hai!"); return; }
            let csv = "Date,Name,Time,OT\n";
            localRecords.forEach(r => csv += `${r.date},${r.name},${r.time},${r.ot}\n`);
            let blob = new Blob([csv], { type: 'text/csv' });
            let url = URL.createObjectURL(blob);
            let a = document.createElement("a");
            a.href = url; a.download = "Attendance.csv"; a.click();
        }
    </script>
</body>
</html>
