<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flash Attendance</title>
    <style>
        body { background: #0c0c0c; color: #fff; font-family: sans-serif; text-align: center; margin: 0; padding: 15px; }
        .container { max-width: 400px; margin: auto; background: #1a1a1a; padding: 20px; border-radius: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #444; background: #222; color: #fff; }
        .btn { width: 100%; padding: 12px; margin-top: 10px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
        .save-btn { background: #ff3333; color: white; }
        .csv-btn { background: #008800; color: white; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 12px; }
        th, td { padding: 8px 2px; border: 1px solid #444; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🕐 Attendance</h1>
        <div id="userSetup"><input type="text" id="userName" placeholder="Apna Naam..."><button class="btn save-btn" onclick="setUser()">START</button></div>
        <div id="mainApp" style="display:none;">
            <h2 id="userNameDisplay"></h2>
            <input type="time" id="time">
            <label><input type="checkbox" id="breakCheck"> Break hui? (6 se OT)</label>
            <button id="actionBtn" class="btn save-btn" onclick="handleOT()">Save OT</button>
            <button class="btn csv-btn" onclick="downloadCSV()">📥 CSV</button>
            <h3 id="totalOT">Total OT: 0</h3>
            <table><thead><tr><th>Date</th><th>Time</th><th>OT</th></tr></thead><tbody id="tableBody"></tbody></table>
        </div>
    </div>

    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbxdrsiAuL-nSTG_4-Pac9Aa5DcBZavzpEBwOYxXUzP6WjcpaV2C6hHNJQv9GSwLYcXD/exec";
        let isEditing = false;

        function setUser() {
            localStorage.setItem("my_name", document.getElementById("userName").value);
            location.reload();
        }

        async function loadMyData() {
            let res = await fetch(scriptURL + "?name=" + encodeURIComponent(localStorage.getItem("my_name")));
            let data = await res.json();
            let tbody = document.getElementById("tableBody"), total = 0, today = new Date().toISOString().split('T')[0];
            tbody.innerHTML = "";
            data.forEach((row, i) => {
                if(i > 0) {
                    tbody.innerHTML += `<tr><td>${row[0]}</td><td>${row[2]}</td><td>${row[3]}</td></tr>`;
                    total += parseFloat(row[3]);
                    if(row[0] == today) { isEditing = true; document.getElementById("actionBtn").innerText = "Update OT"; }
                }
            });
            document.getElementById("totalOT").innerText = "Total OT: " + total.toFixed(1);
        }

        async function handleOT() {
            let time = document.getElementById("time").value;
            let [h, m] = time.split(':').map(Number);
            let start = document.getElementById("breakCheck").checked ? 6 : 5.5;
            let ot = Math.max(0, (h + m/60) - start).toFixed(1);
            
            await fetch(scriptURL, { 
                method: 'POST', mode: 'no-cors', 
                body: JSON.stringify({action: isEditing ? "UPDATE" : "SAVE", date: new Date().toISOString().split('T')[0], name: localStorage.getItem("my_name"), time, ot}) 
            });
            alert("✅ Done!"); location.reload();
        }

        if(localStorage.getItem("my_name")) {
            document.getElementById("userSetup").style.display = "none";
            document.getElementById("mainApp").style.display = "block";
            document.getElementById("userNameDisplay").innerText = "User: " + localStorage.getItem("my_name");
            loadMyData();
        }
    </script>
</body>
</html>
